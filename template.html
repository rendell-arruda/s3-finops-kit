<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>S3 FinOps Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f5f5f5;
        }
        h1 {
            color: #232f3e;
        }
        p.gerado {
            color: #888;
            font-size: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        th {
            background: #232f3e;
            color: white;
            padding: 12px 16px;
            text-align: left;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: #f0f7ff;
        }
    </style>
</head>
<body>
    <h1>S3 FinOps Report</h1>
    <p class="gerado">Gerado em: {{GERADO_EM}}</p>

    <table>
        <thead>
            <tr>
                <th>Bucket</th>
                <th>Storage class</th>
                <th>Tamanho (GB)</th>
            </tr>
        </thead>
        <tbody>
            {{TABELA}}
        </tbody>
    </table>
</body>
</html>
